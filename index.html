<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta estratégica - Queenchis | OPEN CLUB</title>
    
    <!-- LIBRERÍAS DE EXPORTACIÓN Y RENDIMIENTO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TIPOGRAFÍA SISTEMA -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- FRAMEWORK -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocd: {
                            black: '#050505',
                            green: '#4ADE80',
                            gray: '#F8F9FA',
                            textMuted: '#656568',
                            border: '#E5E7EB',
                            accent: '#800020'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        /* UI/UX Optimizations */
        * { 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
            touch-action: manipulation; 
        }
        body { background-color: #f3f4f6; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; margin: 0; padding: 0; }
        
        .a4-page { 
            width: 100%; 
            max-width: 100%; 
            background: white; 
            margin: 0 auto; 
            padding: 1.5rem; 
            padding-bottom: 4rem; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            position: relative; 
            z-index: 1;
        }

        @media (min-width: 768px) {
            .a4-page {
                width: 210mm;
                max-width: 210mm;
                min-height: 297mm;
                margin: 2rem auto;
                padding: 20mm;
                padding-bottom: 20mm;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            }
        }

        /* Estabilizador de PDF: Asegura colores y layout extendido */
        .exporting-pdf {
            width: 800px !important; 
            max-width: 800px !important;
            padding: 40px !important;
            box-shadow: none !important;
            transform: none !important;
            background: white !important;
            position: absolute !important;
            left: -9999px !important;
            top: 0 !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4ADE80; border-radius: 10px; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .a4-page { width: 100%; max-width: none; min-height: 100%; margin: 0; padding: 10mm; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- COMPONENTES AUXILIARES ---
        function RadarChart({ data }) {
            const points = data.length;
            const radius = 68; 
            const center = 100;
            const angleStep = (Math.PI * 2) / points;
            const getPath = (values) => {
                return values.map((val, i) => {
                    const r = (val / 10) * radius;
                    const x = center + r * Math.sin(i * angleStep);
                    const y = center - r * Math.cos(i * angleStep);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ') + ' Z';
            };
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full max-w-[280px] mx-auto overflow-visible">
                    {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => (
                        <circle key={i} cx={center} cy={center} r={radius * p} stroke="#E5E7EB" strokeWidth="1" fill="none" />
                    ))}
                    {data.map((_, i) => {
                        const x2 = center + radius * Math.sin(i * angleStep);
                        const y2 = center - radius * Math.cos(i * angleStep);
                        return <line key={i} x1={center} y1={center} x2={x2} y2={y2} stroke="#E5E7EB" strokeWidth="1" />;
                    })}
                    <path d={getPath(data.map(d => d.current))} fill="#8B8B8B" fillOpacity="0.15" stroke="#8B8B8B" strokeWidth="1" />
                    <path d={getPath(data.map(d => d.potential))} fill="#4ADE80" fillOpacity="0.25" stroke="#4ADE80" strokeWidth="2.5" />
                    {data.map((d, i) => {
                        const x = center + (radius + 28) * Math.sin(i * angleStep);
                        const y = center - (radius + 20) * Math.cos(i * angleStep);
                        return (
                            <text key={i} x={x} y={y} textAnchor="middle" fill="#656568" className="font-mono text-[7px] font-bold uppercase tracking-tighter text-[8px]">
                                {d.axis}
                            </text>
                        );
                    })}
                </svg>
            );
        }

        const fCLP = (num) => '$' + Math.round(num || 0).toLocaleString('es-CL').replace(/,/g, '.');

        // --- DATOS MAESTROS ---
        const BASE_RATE = 25000;
        const DISCOUNT_PCT = 0.20;

        const PHASES = [
            {
                id: 'f1',
                title: 'Fase 1: Identidad & Fundación',
                tag: 'NECESARIA',
                color: 'bg-ocd-green text-black font-bold',
                items: [
                    { id: 'f1_0', name: 'Reunión: Briefing & definición', desc: 'Alineación de objetivos y marco estratégico del proyecto (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0, isEssential: true },
                    { id: 'f1_1', name: 'Logo principal + sistema visual', desc: 'Desarrollo de 2 direcciones gráficas estratégicas y versiones oficiales.', hours: 14.0, days: 5, isEssential: true },
                    { id: 'f1_2', name: 'Manual de marca', desc: 'Guía técnica integral que consolida paleta de colores, familia tipográfica y normas de uso.', hours: 5.0, days: 2, priceOverride: 100000, isEssential: true },
                    { id: 'f1_3', name: 'Señalética física (2 piezas)', desc: 'Diseño técnico de 2 piezas para el local. Ej: Letrero fachada, pizarras de menú, vinilos o señalética interior.', hours: 4.0, days: 2, isEssential: true },
                    { id: 'f1_4', name: 'Diseño de menú base', desc: 'Diseño de 1 ejemplar maestro de carta adaptable. Arquitectura de contenido estratégica.', hours: 6.0, days: 3, isEssential: true }
                ]
            },
            {
                id: 'f2',
                title: 'Fase 2: Expansión & Arte visual',
                tag: 'SUGERIDA',
                color: 'bg-ocd-black text-ocd-green',
                items: [
                    { id: 'f2_1', name: 'Stickers packaging', desc: 'Diseño de 3 variantes de etiquetas de marca para diversos soportes.', hours: 2.0, days: 1, priceOverride: 50000 },
                    { id: 'f2_pap', name: 'Papelería corporativa', desc: 'Diseño para pieza impresa para difusión y operación (flyers, tarjetas o posters).', hours: 3.5, days: 2, priceOverride: 50000 },
                    { id: 'f2_m', name: 'Ilustración / Mascot creation', desc: 'Desarrollo de personaje o mascota animada en 3 poses.', hours: 8.0, days: 4, priceOverride: 50000 },
                    { id: 'f2_p', name: 'Dirección creativa para campaña', desc: 'Conceptos visuales y narrativa para el lanzamiento del local y redes sociales.', hours: 6.0, days: 3 },
                    { id: 'f2_f', name: 'Reunión: Presentación final', desc: 'Cierre de etapa de diseño y entrega oficial de activos del sistema (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0 }
                ]
            },
            {
                id: 'f3',
                title: 'Fase 3: Entorno digital & Merch',
                tag: 'OPCIONAL',
                color: 'bg-zinc-100 text-zinc-500',
                items: [
                    { id: 'f3_1', name: 'Landing page (UI o HTML)', desc: 'Interfaz de alto impacto entregada en Figma o código HTML listo para web.', hours: 25.0, days: 10 },
                    { id: 'f3_2', name: '12 Plantillas editables RRSS', desc: 'Set de 12 plantillas maestras a elección del cliente (Posts o Stories).', hours: 6.5, days: 3 },
                    { id: 'm_base', name: 'Merch / Diseño base', desc: 'Aplicación simple en indumentaria (delantales, gorras o tote bags).', hours: 2.5, days: 2, priceOverride: 50000 },
                    { id: 'm_complex', name: 'Merch / Diseño ilustrado', desc: 'Arte a gran escala aplicada a soportes textiles premium.', hours: 5.5, days: 4, priceOverride: 100000 },
                    { id: 'cons_1', name: 'Consultoría estratégica', desc: 'Asesoría técnica para la toma de decisiones tácticas o expansivas.', hours: 1.0, days: 0, priceOverride: 50000 }
                ]
            }
        ];

        // =====================================================================
        // APP PRINCIPAL
        // =====================================================================
        const App = () => {
            const [selectedItems, setSelectedItems] = useState(new Set([
                'f1_0', 'f1_1', 'f1_2', 'f1_3', 'f1_4', 'f2_1', 'f2_pap', 'm_base', 'f2_f'
            ]));
            const [expandedPhases, setExpandedPhases] = useState(new Set(['f1', 'f2', 'f3'])); 
            const [isExporting, setIsExporting] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState('01'); 
            const [isApproved, setIsApproved] = useState(false);

            const toggleItem = (id) => {
                const next = new Set(selectedItems);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedItems(next);
            };

            const togglePhase = (phaseId) => {
                const next = new Set(expandedPhases);
                if (next.has(phaseId)) next.delete(phaseId); else next.add(phaseId);
                setExpandedPhases(next);
            };

            const stats = useMemo(() => {
                let hrs = 0; let days = 0; let rawTotal = 0;
                const details = [];
                PHASES.forEach(p => {
                    p.items.forEach(i => {
                        if (selectedItems.has(i.id)) {
                            const itemPrice = (i.priceOverride !== undefined ? i.priceOverride : i.hours * BASE_RATE);
                            hrs += i.hours;
                            days += i.days;
                            rawTotal += itemPrice;
                            details.push({ name: i.name, price: itemPrice });
                        }
                    });
                });
                const totalDays = days + Math.ceil(days * 0.20);
                const totalWeeks = (totalDays / 5).toFixed(1);
                const discount = Math.round((rawTotal * DISCOUNT_PCT) / 1000) * 1000;
                const final = rawTotal - discount;
                return { totalDays, totalWeeks, rawTotal, discount, final, details, count: selectedItems.size };
            }, [selectedItems]);

            const abonoA = Math.round((stats.final * 0.5) / 1000) * 1000;
            const abonoB = Math.round((stats.final * 0.3) / 1000) * 1000;

            const handleDownloadPDF = async () => {
                if (isExporting) return;
                setIsExporting(true);
                const currentScroll = window.scrollY; 
                window.scrollTo(0, 0); 

                setTimeout(async () => {
                    try {
                        const element = document.querySelector('.a4-page');
                        const canvas = await html2canvas(element, {
                            scale: 3, // Calidad superior
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            logging: false,
                            scrollY: -window.scrollY,
                            windowWidth: 800 // Fuerza renderizado desktop para evitar saltos
                        });
                        
                        const imgData = canvas.toDataURL('image/png', 1.0);
                        const imgWidth = 210; 
                        const pageHeight = (canvas.height * imgWidth) / canvas.width;
                        
                        const pdf = new jspdf.jsPDF({
                            orientation: 'p',
                            unit: 'mm',
                            format: [imgWidth, pageHeight]
                        });
                        
                        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, pageHeight);
                        pdf.save(`Propuesta_Cotizacion_Queenchis_OCD.pdf`);
                    } catch (err) { 
                        console.error('PDF Error:', err); 
                    } finally {
                        window.scrollTo(0, currentScroll); 
                        setIsExporting(false);
                    }
                }, 500);
            };

            const handleWhatsApp = (type = 'payment') => {
                const planText = selectedPlan === '01' ? 'Protocolo Bifásico (50/50)' : 'Estructura Trifásica (30/30/40)';
                const paymentAmount = selectedPlan === '01' ? abonoA : abonoB;
                const paymentMsg = `¡Hola Yi! ✶ Te confirmo que avanzaremos con la *${planText}* de la propuesta para Queenchis. Adjunto el PDF y el comprobante por el abono de ${fCLP(paymentAmount)}. (Mis datos para la boleta: RUT, Nombres, Domicilio, Comuna). Gracias!`;
                const helpMsg = `¡Hola Yi! ✶ Tengo algunas dudas sobre la propuesta de Queenchis, ¿podemos conversar?`;
                const text = type === 'payment' ? paymentMsg : helpMsg;
                window.location.assign(`https://api.whatsapp.com/send?phone=56949873116&text=${encodeURIComponent(text)}`);
            };

            return (
                <div className="flex flex-col items-center relative min-h-screen overflow-x-hidden">
                    
                    {/* DOCUMENT PAGE */}
                    <div className="a4-page animate-fade-in">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-2 border-ocd-black pb-5 md:pb-6 mb-10 gap-5 md:gap-0">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-3.5 h-3.5 bg-ocd-green rounded-full"></div>
                                    <h1 className="font-black text-3xl md:text-4xl tracking-tighter text-ocd-black uppercase leading-none">OPEN CLUB</h1>
                                </div>
                                <div className="font-mono text-[10px] md:text-[11px] tracking-[0.25em] text-ocd-textMuted uppercase font-bold ml-6">Visual Infrastructure</div>
                            </div>
                            <div className="text-left md:text-right font-mono text-[11px] md:text-[12px] text-ocd-textMuted leading-relaxed">
                                <div>REF_ID: OCD-QCH-2026</div>
                                <div>FECHA: 22 ABRIL 2026</div>
                                <div className="text-ocd-green font-bold mt-2 bg-ocd-green/10 px-2.5 py-1 inline-block uppercase text-[10px]">Status: Valid proposal</div>
                            </div>
                        </header>

                        <div className="mb-10">
                            <span className="font-mono text-[10px] text-ocd-green font-bold tracking-[0.3em] uppercase mb-2 block">Branding Strategy /// Client Proposal</span>
                            <h2 className="text-3xl md:text-5xl font-black tracking-tighter text-zinc-900 leading-none uppercase">Propuesta de cotización <br/> para Queenchis</h2>
                        </div>

                        <section className="mb-10">
                            <h2 className="text-xl md:text-2xl font-bold tracking-tight text-ocd-black mb-4 uppercase tracking-tighter text-zinc-900">Contexto</h2>
                            <div className="text-zinc-700 text-sm md:text-[15px] leading-relaxed max-w-2xl mb-5">
                                <p className="mb-3">
                                    <strong>Queenchis</strong> es una sandwichería de autor inspirada en la mascota Queen. Ubicado en la Galería La Pérgola, Providencia, el proyecto combina el respeto por la cocina de autor con la versatilidad de carnes de cocción lenta y un toque de estética nipona.
                                </p>
                                <p>
                                    Nuestro objetivo es alinear esta visión gourmet con un sistema de marca escalable, priorizando la identidad core, la mascota y los puntos de contacto que definen la experiencia frente al público.
                                </p>
                            </div>
                            <div className="font-mono text-[11px] bg-ocd-gray border border-ocd-border inline-block px-4 py-2.5 text-ocd-black font-bold uppercase tracking-widest">Identidad: Queenchis</div>
                        </section>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 items-center bg-zinc-50 p-6 rounded-2xl border border-zinc-100">
                            <div>
                                <h3 className="text-lg md:text-xl font-bold mb-2 uppercase text-ocd-black tracking-tight">Brand potential matrix</h3>
                                <p className="text-[11px] text-zinc-500 mb-5 leading-relaxed">Impacto proyectado en el sistema visual.</p>
                                <div className="flex flex-wrap gap-4 text-[10px] font-mono font-bold uppercase">
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-zinc-200"></div> Estado Actual</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-ocd-green"></div> Con Open Club</div>
                                </div>
                            </div>
                            <div className="h-56 flex items-center justify-center">
                                <RadarChart data={[
                                    { axis: 'Identidad', current: 2, potential: 9.5 },
                                    { axis: 'Digital', current: 1.5, potential: 9 },
                                    { axis: 'Experiencia', current: 2, potential: 9.5 },
                                    { axis: 'Branding', current: 2, potential: 9 },
                                    { axis: 'Social', current: 3, potential: 8.5 }
                                ]} />
                            </div>
                        </div>

                        <div className="mb-10 p-5 bg-ocd-gray border border-ocd-border rounded-sm">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-5 md:gap-0">
                                <div>
                                    <span className="font-mono text-[10px] text-ocd-textMuted font-bold uppercase tracking-widest block mb-1">Línea de tiempo proyectada</span>
                                    <div className="text-xl font-bold text-ocd-black uppercase tracking-tighter">Ciclo de entrega: ~{stats.totalWeeks} semanas</div>
                                </div>
                                <div className="text-xl font-bold text-ocd-green uppercase">Presupuestado</div>
                            </div>
                            <div className="timeline-container h-12">
                                <div className="timeline-line top-[30px]"></div>
                                <div className="flex justify-between relative">
                                    {['Briefing', 'Concepto', 'Producción', 'Handoff'].map((step, i) => (
                                        <div key={i} className="flex flex-col items-center gap-3 w-1/4">
                                            <div className={`timeline-dot w-2.5 h-2.5 ${i===0?'active':''}`}></div>
                                            <span className="font-mono text-[9px] font-bold text-ocd-textMuted uppercase text-center">{step}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* LISTA DE SERVICIOS */}
                        <div className="mb-14">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-6">
                                <div>
                                    <h3 className="text-xl font-black text-ocd-black uppercase tracking-tight">Servicios & Entregables</h3>
                                    <p className="text-xs text-zinc-500 font-mono uppercase tracking-widest mt-1">✶ Haz clic en los servicios para agregarlos o quitarlos de tu plan personalizado.</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-[10px] font-mono text-ocd-green font-bold bg-ocd-green/10 px-2 py-1 rounded">{stats.count} Ítems seleccionados</span>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {PHASES.map((phase) => {
                                    const selectedInPhase = phase.items.filter(i => selectedItems.has(i.id));
                                    const phasePrice = selectedInPhase.reduce((acc, curr) => acc + (curr.priceOverride !== undefined ? curr.priceOverride : curr.hours * BASE_RATE), 0);
                                    const isAllSelected = selectedInPhase.length === phase.items.length;
                                    const isExpanded = expandedPhases.has(phase.id);

                                    return (
                                        <div key={phase.id} className="w-full border border-ocd-border rounded-xl overflow-hidden shadow-sm">
                                            <div 
                                                className="w-full flex justify-between items-center bg-ocd-gray px-5 py-4 no-print select-none cursor-pointer active:bg-zinc-200 transition-colors"
                                                onClick={() => togglePhase(phase.id)}
                                            >
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className={`transition-transform duration-300 ${isExpanded ? 'rotate-0' : '-rotate-90'}`}>
                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                                    </div>
                                                    <div className="font-bold text-ocd-black text-[14px] uppercase tracking-wide leading-none">{phase.title}</div>
                                                    <span className={`font-mono text-[9px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter ${phase.color}`}>{phase.tag}</span>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="font-mono text-[13px] text-ocd-textMuted font-bold">{fCLP(phasePrice)}</div>
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            const next = new Set(selectedItems);
                                                            phase.items.forEach(item => { if (isAllSelected) next.delete(item.id); else next.add(item.id); });
                                                            setSelectedItems(next);
                                                        }}
                                                        className={`w-6 h-6 rounded border flex items-center justify-center shrink-0 transition-all active:scale-90 ${isAllSelected ? 'bg-ocd-green border-ocd-green text-black' : 'border-gray-400 bg-white'}`}
                                                    >
                                                        {isAllSelected && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" className="md:w-[10px] md:h-[10px]"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            {isExpanded && (
                                                <div className="border-t border-ocd-border bg-white divide-y divide-gray-100 animate-fade-in">
                                                    <div className="hidden md:grid grid-cols-12 gap-4 bg-ocd-black text-white px-5 py-3 font-mono text-[10px] font-bold uppercase tracking-widest">
                                                        <div className="col-span-4">Servicio</div>
                                                        <div className="col-span-6">Detalle de entregable</div>
                                                        <div className="col-span-2 text-right">Inversión</div>
                                                    </div>
                                                    {phase.items.map(item => {
                                                        const isSelected = selectedItems.has(item.id);
                                                        const price = item.priceOverride !== undefined ? item.priceOverride : item.hours * BASE_RATE;
                                                        return (
                                                            <div key={item.id} onClick={() => toggleItem(item.id)} className={`p-5 md:p-3 grid grid-cols-1 md:grid-cols-12 gap-4 cursor-pointer transition-colors active:bg-green-50 ${isSelected ? 'hover:bg-green-50' : 'opacity-40 grayscale print:hidden'}`}>
                                                                <div className="md:col-span-4 flex items-start gap-4">
                                                                    <div className={`no-print w-5 h-5 rounded-sm border flex items-center justify-center shrink-0 mt-0.5 transition-all ${isSelected ? 'bg-ocd-green border-ocd-green text-black scale-100' : 'border-gray-300 scale-95'}`}>
                                                                        {isSelected && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" className="md:w-2 md:h-2"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                                                    </div>
                                                                    <span className="font-bold md:font-medium text-ocd-black text-[15px] md:text-sm leading-tight">{item.name}{item.isEssential && <span className="text-ocd-green font-bold ml-1">*</span>}</span>
                                                                </div>
                                                                <div className="md:col-span-6 pl-10 md:pl-0 text-[14px] md:text-xs text-gray-500 leading-snug">{item.desc}</div>
