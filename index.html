<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta estratégica - Queenchis | OPEN CLUB</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocd: {
                            black: '#050505',
                            green: '#4ADE80',
                            gray: '#F8F9FA',
                            textMuted: '#656568',
                            border: '#E5E7EB'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        
        .a4-page { 
            width: 100%; 
            max-width: 100%; 
            background: white; 
            margin: 0 auto; 
            padding: 1.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            position: relative; 
        }
        @media (min-width: 768px) {
            .a4-page {
                max-width: 210mm;
                min-height: 297mm;
                margin: 2rem auto;
                padding: 20mm;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            }
        }

        .sde-table th { background-color: #050505; color: white; padding: 12px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; font-family: 'Space Mono', monospace; white-space: nowrap; }
        .sde-table td { padding: 16px; border-bottom: 1px solid #E5E7EB; font-size: 13px; color: #374151; transition: background-color 0.2s; }
        .sde-table tr:last-child td { border-bottom: none; }
        .sde-table tbody tr { cursor: pointer; }
        .sde-table tbody tr:hover td { background-color: #f0fdf4; }
        
        .radar-grid { stroke: #E5E7EB; stroke-width: 1; fill: none; }
        .radar-axis { stroke: #E5E7EB; stroke-width: 1; }
        .radar-area-current { fill: #8B8B8B; fill-opacity: 0.15; stroke: #8B8B8B; stroke-width: 1; }
        .radar-area-potential { fill: #4ADE80; fill-opacity: 0.25; stroke: #4ADE80; stroke-width: 2.5; }
        
        .timeline-container { position: relative; padding-top: 20px; }
        .timeline-line { height: 2px; background: #E5E7EB; position: absolute; top: 30px; left: 0; right: 0; }
        .timeline-dot { width: 10px; height: 10px; background: #E5E7EB; border-radius: 50%; position: relative; z-index: 1; }
        .timeline-dot.active { background: #4ADE80; box-shadow: 0 0 8px #4ADE80; }

        .quick-cart {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Inter', sans-serif;
        }
        @media (min-width: 768px) {
            .quick-cart {
                bottom: 30px;
                right: 30px;
            }
        }
        
        .cart-bubble {
            background: #050505;
            color: white;
            padding: 12px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (min-width: 768px) {
            .cart-bubble {
                padding: 16px 24px;
                gap: 15px;
                box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4);
            }
        }
        
        .cart-bubble:hover { transform: scale(1.05); border-color: #4ADE80; }

        .cart-dropdown {
            width: calc(100vw - 32px);
            max-width: 400px;
            background: #111113; 
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 768px) {
            .cart-dropdown {
                width: 380px;
                border-radius: 24px;
                padding: 24px;
                margin-bottom: 15px;
                box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
            }
        }

        .cart-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4ADE80; border-radius: 10px; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .a4-page { width: 100%; max-width: none; min-height: 100%; margin: 0; padding: 10mm; box-shadow: none; border: none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const fCLP = (num) => '$' + Math.round(num).toLocaleString('es-CL');

        const BASE_RATE = 25000;
        const DISCOUNT_PCT = 0.20;

        const PHASES = [
            {
                id: 'f1',
                title: 'Fase 1: Identidad & Fundación',
                tag: 'NECESARIA',
                color: 'bg-ocd-green text-black font-bold',
                items: [
                    { id: 'f1_0', name: 'Reunión: Briefing & definición', desc: 'Alineación de objetivos y marco estratégico del proyecto (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0, isEssential: true },
                    { id: 'f1_1', name: 'Logo principal + sistema visual', desc: 'Desarrollo de 2 direcciones gráficas estratégicas, versiones oficiales y reducciones técnicas.', hours: 14.0, days: 5, isEssential: true },
                    { id: 'f1_2', name: 'Manual de marca', desc: 'Guía técnica integral que consolida paleta de colores, familia tipográfica y normas de uso.', hours: 5.0, days: 2, isEssential: true },
                    { id: 'f1_3', name: 'Señalética física', desc: 'Diseño técnico de señalización de marca para el local físico (ej. letrero de fachada, pizarras o señalización interna a elección).', hours: 4.0, days: 2, isEssential: true },
                    { id: 'f1_4', name: 'Diseño de menú base', desc: 'Diseño de 1 ejemplar maestro de carta adaptable. Arquitectura de contenido para destacar la propuesta de autor.', hours: 6.0, days: 3, isEssential: true }
                ]
            },
            {
                id: 'f2',
                title: 'Fase 2: Expansión & Arte visual',
                tag: 'SUGERIDA',
                color: 'bg-ocd-black text-ocd-green',
                items: [
                    { id: 'f2_1', name: 'Stickers packaging', desc: 'Diseño de 2 variantes de etiquetas de marca.', hours: 2.0, days: 1 },
                    { id: 'f2_pap', name: 'Papelería corporativa', desc: 'Diseño para pieza impresa para difusión y operación (flyers, tarjetas de presentación, posters, etc.).', hours: 3.5, days: 2 },
                    { id: 'f2_m', name: 'Ilustración / Mascot creation', desc: 'Desarrollo de personaje o mascota animada en 3 poses.', hours: 8.0, days: 4 },
                    { id: 'f2_p', name: 'Dirección creativa para campaña', desc: 'Conceptos visuales y narrativa para el lanzamiento del local y redes sociales.', hours: 6.0, days: 3 },
                    { id: 'f2_f', name: 'Reunión: Presentación final', desc: 'Cierre de etapa de diseño y entrega oficial de activos del sistema (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0 }
                ]
            },
            {
                id: 'f3',
                title: 'Fase 3: Entorno digital & Merch',
                tag: 'OPCIONAL',
                color: 'bg-zinc-100 text-zinc-500',
                items: [
                    { id: 'f3_1', name: 'Landing page (Diseño UI o HTML)', desc: 'Interfaz de alto impacto entregada en Figma o código HTML listo para ser implementado en web.', hours: 25.0, days: 10 },
                    { id: 'f3_kiosk', name: 'Diseño de interfaz interactiva', desc: 'Diseño UX/UI para pantallas táctiles de auto-atención. Flujos de navegación optimizados para venta rápida (las horas aplican a un set base de pantallas, variable según cada caso).', hours: 16.0, days: 5 },
                    { id: 'f3_2', name: '12 plantillas editables RRSS', desc: 'Set de 12 plantillas maestras a elección del cliente (Posts o Stories).', hours: 6.5, days: 3 },
                    { id: 'm_base', name: 'Merch / Diseño base', desc: 'Aplicación simple en delantales, bolsas tote e indumentaria varia.', hours: 2.5, days: 2 },
                    { id: 'm_complex', name: 'Merch / Diseño ilustrado', desc: 'Arte a gran escala o ilustración compleja aplicada a soportes textiles premium.', hours: 5.5, days: 4 },
                    { id: 'cons_1', name: 'Consultoría estratégica', desc: 'Asesoría técnica para la toma de decisiones tácticas o expansivas (valor por hora).', hours: 1.0, days: 0, priceOverride: 50000 }
                ]
            }
        ];

        const RadarChart = ({ data }) => {
            const points = data.length;
            const radius = 68; 
            const center = 100;
            const angleStep = (Math.PI * 2) / points;
            const getPath = (values) => {
                return values.map((val, i) => {
                    const r = (val / 10) * radius;
                    const x = center + r * Math.sin(i * angleStep);
                    const y = center - r * Math.cos(i * angleStep);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ') + ' Z';
            };
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full max-w-[280px] mx-auto font-sans overflow-visible">
                    {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => (
                        <circle key={i} cx={center} cy={center} r={radius * p} className="radar-grid" />
                    ))}
                    {data.map((_, i) => {
                        const x2 = center + radius * Math.sin(i * angleStep);
                        const y2 = center - radius * Math.cos(i * angleStep);
                        return <line key={i} x1={center} y1={center} x2={x2} y2={y2} className="radar-axis" />;
                    })}
                    <path d={getPath(data.map(d => d.current))} className="radar-area-current" />
                    <path d={getPath(data.map(d => d.potential))} className="radar-area-potential" />
                    {data.map((d, i) => {
                        const x = center + (radius + 28) * Math.sin(i * angleStep);
                        const y = center - (radius + 20) * Math.cos(i * angleStep);
                        return (
                            <text key={i} x={x} y={y} textAnchor="middle" className="font-mono text-[6.5px] md:text-[7px] uppercase tracking-tighter fill-zinc-600 font-bold">
                                {d.axis}
                            </text>
                        );
                    })}
                </svg>
            );
        };

        const App = () => {
            const [selectedItems, setSelectedItems] = useState(new Set([
                'f1_0', 'f1_1', 'f1_2', 'f1_3', 'f1_4', 'f2_1', 'f2_f'
            ]));
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState('A'); 

            const toggleItem = (id) => {
                const next = new Set(selectedItems);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedItems(next);
            };

            const stats = useMemo(() => {
                let hrs = 0; let days = 0; let rawTotal = 0;
                const details = [];
                PHASES.forEach(p => {
                    p.items.forEach(i => {
                        if (selectedItems.has(i.id)) {
                            const itemPrice = (i.priceOverride !== undefined ? i.priceOverride : i.hours * BASE_RATE);
                            hrs += i.hours;
                            days += i.days;
                            rawTotal += itemPrice;
                            details.push({ name: i.name, price: itemPrice, hours: i.hours, isEssential: i.isEssential });
                        }
                    });
                });
                const margin = Math.ceil(days * 0.20);
                const totalDays = days + margin;
                const totalWeeks = (totalDays / 5).toFixed(1);
                const discount = rawTotal * DISCOUNT_PCT;
                const final = rawTotal - discount;
                return { hrs, totalDays, totalWeeks, baseTotal: rawTotal, discount, final, details };
            }, [selectedItems]);

            const radarData = useMemo(() => {
                const sIds = Array.from(selectedItems);
                return [
                    { axis: 'Identidad Visual', current: 2, potential: sIds.some(id => id.includes('f1_1')) ? 9.5 : 4 },
                    { axis: 'Presencia Digital', current: 1.5, potential: sIds.includes('f3_1') ? 9 : 5 }, 
                    { axis: 'Experiencia Local', current: 2, potential: sIds.includes('f1_4') || sIds.includes('f3_kiosk') ? 9.5 : 6 },
                    { axis: 'Branding Físico', current: 2, potential: sIds.includes('f1_3') ? 9 : 5 },
                    { axis: 'Contenido Social', current: 3, potential: sIds.includes('f3_2') || sIds.includes('f2_p') ? 8.5 : 5 } 
                ];
            }, [selectedItems]);

            // PASO 1: Descargar PDF (Aislado con protección de Scroll)
            const handleDownloadPDF = async () => {
                setIsExporting(true);
                setIsCartOpen(false);
                
                const currentScroll = window.scrollY; // Guardamos la posición actual
                
                setTimeout(async () => {
                    window.scrollTo(0, 0); // Scroll temporal para que html2canvas no corte la hoja
                    const element = document.querySelector('.a4-page');
                    try {
                        const canvas = await html2canvas(element, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            scrollY: 0,
                            height: element.scrollHeight 
                        });
                        const imgData = canvas.toDataURL('image/png');
                        const pdfWidth = 210; 
                        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                        
                        const pdf = new jspdf.jsPDF({
                            orientation: 'p',
                            unit: 'mm',
                            format: [pdfWidth, pdfHeight]
                        });
                        
                        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                        pdf.save(`Propuesta_Queenchis_Plan${selectedPlan}.pdf`);
                    } catch (err) {
                        console.error('Error al exportar PDF:', err);
                        window.print(); 
                    } finally {
                        window.scrollTo(0, currentScroll); // Devolvemos al usuario a donde estaba
                        setIsExporting(false);
                    }
                }, 100);
            };

            // PASO 2: Enviar a WhatsApp
            const handleWhatsApp = () => {
                const planAbono = selectedPlan === 'A' ? stats.final * 0.5 : stats.final * 0.3;
                const text = `¡Hola Yi! ✶ Te confirmo que avanzaremos con el *Plan ${selectedPlan}* de la propuesta. Aquí te adjunto el PDF de la propuesta y el comprobante de transferencia por el abono inicial de ${fCLP(planAbono)}. (Mis datos para la boleta: RUT, Nombres, Domicilio, Comuna). Gracias, ¡Hablamos!`;
                
                const encodedText = encodeURIComponent(text);
                window.open(`https://wa.me/?text=${encodedText}`, '_blank');
            };

            const scrollToCheckout = () => {
                document.getElementById('checkout-section').scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="text-ocd-black font-sans flex flex-col items-center relative min-h-screen">
                    
                    {/* QUICK CART MODULE */}
                    {!isExporting && (
                        <div className="quick-cart no-print">
                            <div className={`cart-dropdown ${isCartOpen ? 'open' : ''}`}>
                                <div className="flex justify-between items-center mb-4 md:mb-5 border-b border-white/10 pb-4 shrink-0">
                                    <span className="font-mono text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400">System Cart</span>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-white p-2 -mr-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar pr-2 space-y-1 flex-1 mb-2">
                                    {stats.details.map((item, idx) => (
                                        <div key={idx} className="group flex justify-between items-start gap-4 p-2.5 rounded-lg hover:bg-white/5 transition-colors border border-transparent hover:border-white/10">
                                            <div className="flex gap-3 items-start flex-1">
                                                <span className="font-mono text-[9px] text-zinc-600 mt-0.5">{(idx + 1).toString().padStart(2, '0')}</span>
                                                <div>
                                                    <span className="text-[11px] text-zinc-300 font-medium leading-snug block group-hover:text-white transition-colors">
                                                        {item.name} {item.isEssential && <span className="text-ocd-green font-bold ml-1">*</span>}
                                                    </span>
                                                    <span className="font-mono text-[9px] text-zinc-500 mt-1 block">Esfuerzo: {item.hours > 0 ? `${item.hours} HH` : 'Base'}</span>
                                                </div>
                                            </div>
                                            <span className="font-mono text-[10px] text-ocd-green font-medium shrink-0 mt-0.5">{item.price > 0 ? fCLP(item.price) : 'Cortesía'}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-4 border-t border-white/10 space-y-3 shrink-0">
                                    <div className="flex justify-between text-[11px] text-zinc-400 font-mono">
                                        <span>Subtotal</span>
                                        <span>{fCLP(stats.baseTotal)}</span>
                                    </div>
                                    <div className="flex justify-between text-[11px] text-ocd-green font-mono font-bold">
                                        <span>Open Ticket (-20%)</span>
                                        <span>-{fCLP(stats.discount)}</span>
                                    </div>
                                    <div className="h-px w-full bg-white/10 my-2"></div>
                                    <div className="flex justify-between items-end">
                                        <span className="font-mono text-[9px] uppercase tracking-widest text-zinc-400 hidden md:block">Inversión Final</span>
                                        <span className="font-mono text-[9px] uppercase tracking-widest text-zinc-400 md:hidden">Total</span>
                                        <span className="text-3xl font-black text-white tracking-tighter leading-none">{fCLP(stats.final)}</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 gap-2 mt-4">
                                        <button onClick={scrollToCheckout} className="w-full bg-ocd-green text-black font-mono text-[11px] md:text-xs font-bold py-3 md:py-4 rounded-xl uppercase tracking-widest hover:brightness-110 transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                                            Ir a Finalizar & Notificar Pago
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="cart-bubble" onClick={() => setIsCartOpen(!isCartOpen)}>
                                <div className="flex flex-col items-start leading-none">
                                    <span className="text-[8px] font-mono font-bold uppercase tracking-widest text-zinc-400 mb-1">Total Proyecto</span>
                                    <span className="text-base md:text-lg font-black tracking-tight">{fCLP(stats.final)}</span>
                                </div>
                                <div className="w-px h-6 md:h-8 bg-white/20"></div>
                                <div className="bg-ocd-green text-black w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DOCUMENT PAGE */}
                    <div className="a4-page">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-2 border-ocd-black pb-4 md:pb-6 mb-8 md:mb-10 gap-4 md:gap-0">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <div className="w-3 h-3 bg-ocd-green rounded-full"></div>
                                    <h1 className="font-black text-2xl md:text-3xl tracking-tighter text-ocd-black uppercase font-sans leading-none">OPEN CLUB</h1>
                                </div>
                                <div className="font-mono text-[9px] tracking-[0.25em] text-ocd-textMuted uppercase font-bold ml-5">Visual Infrastructure</div>
                            </div>
                            <div className="text-left md:text-right font-mono text-[10px] text-ocd-textMuted leading-relaxed">
                                <div>REF_ID: OCD-QCH-2026</div>
                                <div>FECHA: 22 ABRIL 2026</div>
                                <div className="text-ocd-green font-bold mt-1 bg-ocd-green/10 px-2 py-0.5 inline-block uppercase tracking-wider text-[9px]">Status: Valid proposal</div>
                            </div>
                            
                            {/* Navigation Scroll Button inside header */}
                            <button onClick={scrollToCheckout} className="hidden md:flex ml-4 no-print bg-ocd-black text-white px-4 py-2 rounded-full font-mono text-[10px] font-bold tracking-widest uppercase items-center gap-2 hover:bg-ocd-green hover:text-black transition-all">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                                Ir a Checkout
                            </button>
                        </header>

                        <section className="mb-8 md:mb-10">
                            <h2 className="text-xl md:text-2xl font-bold tracking-tight text-ocd-black mb-3 md:mb-4 uppercase tracking-tighter">Contexto</h2>
                            <div className="text-zinc-700 text-xs md:text-[13.5px] leading-relaxed max-w-2xl mb-4 md:mb-6">
                                <p className="mb-3">
                                    Queenchis es una sandwichería de autor inspirada en la mascota Queen (el nombre rescata el sonido fonético de "Cuinchi"). Ubicado en la Galería La Pérgola, Avenida Providencia, el proyecto combina el respeto por la cocina de autor con la versatilidad de sándwiches clásicos italianos y carnes de cocción lenta.
                                </p>
                                <p>
                                    Trabajaremos para alinear esta visión gourmet con un sistema de marca escalable, priorizando la identidad core, la mascota, influencias y los puntos de contacto que definen la experiencia de la marca.
                                </p>
                            </div>
                            <div className="font-mono text-[9px] md:text-[10px] bg-ocd-gray border border-ocd-border inline-block px-3 py-2 text-ocd-black font-bold tracking-widest uppercase">Identidad: Queenchis</div>
                        </section>
