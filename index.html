<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta estratégica - Queenchis | OPEN CLUB</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocd: {
                            black: '#050505',
                            green: '#4ADE80',
                            gray: '#F8F9FA',
                            textMuted: '#656568',
                            border: '#E5E7EB'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Melhoria de Robustez UI/UX Mobile */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body { background-color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        
        .a4-page { 
            width: 100%; 
            max-width: 100%; 
            background: white; 
            margin: 0 auto; 
            padding: 1.5rem; 
            padding-bottom: 10rem; /* Espaço para o carrinho flutuante em mobile */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            position: relative; 
        }
        @media (min-width: 768px) {
            .a4-page {
                max-width: 210mm;
                min-height: 297mm;
                margin: 2rem auto;
                padding: 20mm;
                padding-bottom: 20mm;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            }
        }

        .quick-cart {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Inter', sans-serif;
        }
        
        .cart-bubble {
            background: #050505;
            color: white;
            padding: 12px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
        }
        
        .cart-dropdown {
            width: calc(100vw - 32px);
            max-width: 400px;
            background: #111113; 
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .cart-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4ADE80; border-radius: 10px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .a4-page { width: 100%; max-width: none; min-height: 100%; margin: 0; padding: 10mm; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const fCLP = (num) => '$' + Math.round(num).toLocaleString('es-CL');

        const BASE_RATE = 25000;
        const DISCOUNT_PCT = 0.20;

        const PHASES = [
            {
                id: 'f1',
                title: 'Fase 1: Identidad & Fundación',
                tag: 'NECESARIA',
                color: 'bg-ocd-green text-black font-bold',
                items: [
                    { id: 'f1_0', name: 'Reunión: Briefing & definición', desc: 'Alineación de objetivos y marco estratégico del proyecto (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0, isEssential: true },
                    { id: 'f1_1', name: 'Logo principal + sistema visual', desc: 'Desarrollo de 2 direcciones gráficas estratégicas, versiones oficiales y reducciones técnicas.', hours: 14.0, days: 5, isEssential: true },
                    { id: 'f1_2', name: 'Manual de marca', desc: 'Guía técnica integral que consolida paleta de colores, familia tipográfica y normas de uso.', hours: 5.0, days: 2, priceOverride: 100000, isEssential: true },
                    { id: 'f1_3', name: 'Señalética física', desc: 'Diseño técnico de señalización de marca para el local físico (ej. letrero de fachada, pizarras o señalización interna a elección).', hours: 4.0, days: 2, isEssential: true },
                    { id: 'f1_4', name: 'Diseño de menú base', desc: 'Diseño de 1 ejemplar maestro de carta adaptable. Arquitectura de contenido para destacar la propuesta de autor.', hours: 6.0, days: 3, isEssential: true }
                ]
            },
            {
                id: 'f2',
                title: 'Fase 2: Expansión & Arte visual',
                tag: 'SUGERIDA',
                color: 'bg-ocd-black text-ocd-green',
                items: [
                    { id: 'f2_1', name: 'Stickers packaging', desc: 'Diseño de 3 variantes de etiquetas de marca.', hours: 2.0, days: 1, priceOverride: 50000 },
                    { id: 'f2_pap', name: 'Papelería corporativa', desc: 'Diseño para pieza impresa para difusión y operación (flyers, tarjetas de presentación, posters, etc.).', hours: 3.5, days: 2, priceOverride: 50000 },
                    { id: 'f2_m', name: 'Ilustración / Mascot creation', desc: 'Desarrollo de personaje o mascota animada en 3 poses.', hours: 8.0, days: 4, priceOverride: 50000 },
                    { id: 'f2_p', name: 'Dirección creativa para campaña', desc: 'Conceptos visuales y narrativa para el lanzamiento del local y redes sociales.', hours: 6.0, days: 3 },
                    { id: 'f2_f', name: 'Reunión: Presentación final', desc: 'Cierre de etapa de diseño y entrega oficial de activos del sistema (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0 }
                ]
            },
            {
                id: 'f3',
                title: 'Fase 3: Entorno digital & Merch',
                tag: 'OPCIONAL',
                color: 'bg-zinc-100 text-zinc-500',
                items: [
                    { id: 'f3_1', name: 'Landing page (Diseño UI o HTML)', desc: 'Interfaz de alto impacto entregada en Figma o código HTML listo para ser implementado en web.', hours: 25.0, days: 10 },
                    { id: 'f3_kiosk', name: 'Diseño de interfaz interactiva', desc: 'Diseño UX/UI para pantallas táctiles de auto-atención. Flujos de navegación optimizados para venta rápida.', hours: 16.0, days: 5 },
                    { id: 'f3_2', name: '12 plantillas editables RRSS', desc: 'Set de 12 plantillas maestras a elección del cliente (Posts o Stories).', hours: 6.5, days: 3 },
                    { id: 'm_base', name: 'Merch / Diseño base', desc: 'Aplicación simple en delantales, bolsas tote e indumentaria varia.', hours: 2.5, days: 2, priceOverride: 50000 },
                    { id: 'm_complex', name: 'Merch / Diseño ilustrado', desc: 'Arte a gran escala o ilustración compleja aplicada a soportes textiles premium.', hours: 5.5, days: 4, priceOverride: 100000 },
                    { id: 'cons_1', name: 'Consultoría estratégica', desc: 'Asesoría técnica para la toma de decisiones tácticas o expansivas.', hours: 1.0, days: 0, priceOverride: 50000 }
                ]
            }
        ];

        const RadarChart = ({ data }) => {
            const points = data.length;
            const radius = 68; 
            const center = 100;
            const angleStep = (Math.PI * 2) / points;
            const getPath = (values) => {
                return values.map((val, i) => {
                    const r = (val / 10) * radius;
                    const x = center + r * Math.sin(i * angleStep);
                    const y = center - r * Math.cos(i * angleStep);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ') + ' Z';
            };
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full max-w-[280px] mx-auto overflow-visible">
                    {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => (
                        <circle key={i} cx={center} cy={center} r={radius * p} stroke="#E5E7EB" strokeWidth="1" fill="none" />
                    ))}
                    {data.map((_, i) => {
                        const x2 = center + radius * Math.sin(i * angleStep);
                        const y2 = center - radius * Math.cos(i * angleStep);
                        return <line key={i} x1={center} y1={center} x2={x2} y2={y2} stroke="#E5E7EB" strokeWidth="1" />;
                    })}
                    <path d={getPath(data.map(d => d.current))} fill="#8B8B8B" fillOpacity="0.15" stroke="#8B8B8B" strokeWidth="1" />
                    <path d={getPath(data.map(d => d.potential))} fill="#4ADE80" fillOpacity="0.25" stroke="#4ADE80" strokeWidth="2.5" />
                    {data.map((d, i) => {
                        const x = center + (radius + 28) * Math.sin(i * angleStep);
                        const y = center - (radius + 20) * Math.cos(i * angleStep);
                        return (
                            <text key={i} x={x} y={y} textAnchor="middle" fill="#656568" className="font-mono text-[7px] font-bold uppercase tracking-tighter">
                                {d.axis}
                            </text>
                        );
                    })}
                </svg>
            );
        };

        const App = () => {
            const [selectedItems, setSelectedItems] = useState(new Set([
                'f1_0', 'f1_1', 'f1_2', 'f1_3', 'f1_4', 'f2_1', 'f2_f'
            ]));
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState('01'); 

            const toggleItem = (id) => {
                const next = new Set(selectedItems);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedItems(next);
            };

            const stats = useMemo(() => {
                let hrs = 0; let days = 0; let rawTotal = 0;
                const details = [];
                PHASES.forEach(p => {
                    p.items.forEach(i => {
                        if (selectedItems.has(i.id)) {
                            const itemPrice = (i.priceOverride !== undefined ? i.priceOverride : i.hours * BASE_RATE);
                            hrs += i.hours;
                            days += i.days;
                            rawTotal += itemPrice;
                            details.push({ name: i.name, price: itemPrice, hours: i.hours, isEssential: i.isEssential });
                        }
                    });
                });
                const margin = Math.ceil(days * 0.20);
                const totalDays = days + margin;
                const totalWeeks = (totalDays / 5).toFixed(1);
                const discount = Math.round((rawTotal * DISCOUNT_PCT) / 1000) * 1000;
                const final = rawTotal - discount;
                return { hrs, totalDays, totalWeeks, baseTotal: rawTotal, discount, final, details };
            }, [selectedItems]);

            const abonoA = Math.round((stats.final * 0.5) / 1000) * 1000;
            const abonoB = Math.round((stats.final * 0.3) / 1000) * 1000;

            const radarData = useMemo(() => {
                const sIds = Array.from(selectedItems);
                return [
                    { axis: 'Identidad Visual', current: 2, potential: sIds.some(id => id.includes('f1_1')) ? 9.5 : 4 },
                    { axis: 'Presencia Digital', current: 1.5, potential: sIds.includes('f3_1') ? 9 : 5 }, 
                    { axis: 'Experiencia Local', current: 2, potential: sIds.includes('f1_4') ? 9.5 : 6 },
                    { axis: 'Branding Físico', current: 2, potential: sIds.includes('f1_3') ? 9 : 5 },
                    { axis: 'Contenido Social', current: 3, potential: sIds.includes('f3_2') ? 8.5 : 5 } 
                ];
            }, [selectedItems]);

            const handleDownloadPDF = async () => {
                if (isExporting) return;
                setIsExporting(true);
                setIsCartOpen(false);
                
                const currentScroll = window.scrollY; 
                window.scrollTo(0, 0); 

                setTimeout(async () => {
                    const element = document.querySelector('.a4-page');
                    try {
                        const canvas = await html2canvas(element, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            scrollY: 0,
                            height: element.scrollHeight 
                        });
                        const imgData = canvas.toDataURL('image/png');
                        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                        pdf.save(`Propuesta_Queenchis_Ruta${selectedPlan}.pdf`);
                    } catch (err) {
                        console.error('PDF Error:', err);
                    } finally {
                        window.scrollTo(0, currentScroll); 
                        setIsExporting(false);
                    }
                }, 300);
            };

            const handleWhatsApp = (type = 'payment') => {
                const planAbono = selectedPlan === '01' ? abonoA : abonoB;
                const paymentMsg = `¡Hola Yi! ✶ Te confirmo que avanzaremos con la *Ruta ${selectedPlan}* de la propuesta. Aquí te adjunto el PDF y el comprobante por el abono de ${fCLP(planAbono)}. (Mis datos: RUT, Nombres, Domicilio, Comuna). Gracias!`;
                const helpMsg = `¡Hola Yi! ✶ Tengo algunas dudas sobre la propuesta, ¿podemos conversar?`;
                
                const text = type === 'payment' ? paymentMsg : helpMsg;
                // Usamos window.location.assign para maior compatibilidade com navegadores móveis (evita bloqueio de pop-ups)
                window.location.assign(`https://api.whatsapp.com/send?phone=56949873116&text=${encodeURIComponent(text)}`);
            };

            const scrollToCheckout = () => {
                document.getElementById('checkout-section').scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="text-ocd-black font-sans flex flex-col items-center relative min-h-screen">
                    
                    {/* CARRINHO DE ACESSO RÁPIDO */}
                    {!isExporting && (
                        <div className="quick-cart no-print">
                            <div className={`cart-dropdown ${isCartOpen ? 'open' : ''}`}>
                                <div className="flex justify-between items-center mb-5 border-b border-white/10 pb-4">
                                    <span className="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-zinc-400">System Cart</span>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-white p-2 -mr-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                </div>
                                
                                <div className="overflow-y-auto custom-scrollbar pr-2 space-y-2 flex-1 mb-3">
                                    {stats.details.map((item, idx) => (
                                        <div key={idx} className="group flex justify-between items-start gap-4 p-3 rounded-lg hover:bg-white/5 transition-colors border border-transparent hover:border-white/10">
                                            <div className="flex gap-3 items-center flex-1">
                                                <span className="font-mono text-[10px] text-zinc-600">{(idx + 1).toString().padStart(2, '0')}</span>
                                                <span className="text-[12px] text-zinc-300 font-medium leading-snug">{item.name}</span>
                                            </div>
                                            <span className="font-mono text-[11px] text-ocd-green font-medium shrink-0">{item.price > 0 ? fCLP(item.price) : 'Cortesía'}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-5 border-t border-white/10 space-y-4">
                                    <div className="flex justify-between text-[12px] md:text-[13px] text-zinc-400 font-mono"><span>Subtotal</span><span>{fCLP(stats.baseTotal)}</span></div>
                                    <div className="flex justify-between text-[12px] md:text-[13px] text-ocd-green font-mono font-bold"><span>Open Ticket (-20%)</span><span>-{fCLP(stats.discount)}</span></div>
                                    <div className="h-px w-full bg-white/10 my-3"></div>
                                    <div className="flex justify-between items-end">
                                        <span className="font-mono text-[10px] uppercase tracking-widest text-zinc-400">Inversión Final</span>
                                        <span className="text-4xl font-black text-white tracking-tighter leading-none">{fCLP(stats.final)}</span>
                                    </div>
                                    <button onClick={scrollToCheckout} className="w-full bg-ocd-green text-black font-mono text-[12px] font-bold py-4 rounded-xl uppercase tracking-widest hover:brightness-110 active:opacity-80 transition-all flex justify-center items-center gap-2">Ir a Finalizar</button>
                                </div>
                            </div>

                            <div className="cart-bubble" onClick={() => setIsCartOpen(!isCartOpen)}>
                                <div className="flex flex-col items-start leading-none">
                                    <span className="text-[9px] font-mono font-bold uppercase tracking-widest text-zinc-400 mb-1">Total Proyecto</span>
                                    <span className="text-lg md:text-xl font-black tracking-tight">{fCLP(stats.final)}</span>
                                </div>
                                <div className="w-px h-8 bg-white/20 mx-2"></div>
                                <div className="bg-ocd-green text-black w-8 h-8 rounded-full flex items-center justify-center">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PÁGINA DO DOCUMENTO */}
                    <div className="a4-page">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-2 border-ocd-black pb-5 md:pb-6 mb-10 gap-5 md:gap-0">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-3 h-3 bg-ocd-green rounded-full"></div>
                                    <h1 className="font-black text-3xl tracking-tighter text-ocd-black uppercase leading-none">OPEN CLUB</h1>
                                </div>
                                <div className="font-mono text-[10px] tracking-[0.25em] text-ocd-textMuted uppercase font-bold ml-6">Visual Infrastructure</div>
                            </div>
                            <div className="text-left md:text-right font-mono text-[11px] text-ocd-textMuted leading-relaxed">
                                <div>REF_ID: OCD-QCH-2026</div>
                                <div>FECHA: 22 ABRIL 2026</div>
                                <div className="text-ocd-green font-bold mt-2 bg-ocd-green/10 px-2.5 py-1 inline-block uppercase text-[10px]">Status: Valid proposal</div>
                            </div>
                        </header>

                        <section className="mb-10">
                            <h2 className="text-2xl font-bold tracking-tight text-ocd-black mb-4 uppercase tracking-tighter">Contexto</h2>
                            <p className="text-zinc-700 text-[15px] leading-relaxed max-w-2xl mb-5">
                                Queenchis es una sandwichería de autor inspirada en la mascota Queen. Ubicado en la Galería La Pérgola, Avenida Providencia, combina cocina de autor con la versatilidad de clásicos italianos. Alinearemos esta visión con un sistema de marca escalable.
                            </p>
                            <div className="font-mono text-[10px] bg-ocd-gray border border-ocd-border inline-block px-4 py-2.5 text-ocd-black font-bold uppercase">Identidad: Queenchis</div>
                        </section>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 items-center bg-zinc-50 p-6 rounded-2xl border border-zinc-100">
                            <div>
                                <h3 className="text-lg font-bold mb-2 uppercase text-ocd-black">Brand potential matrix</h3>
                                <p className="text-[11px] text-zinc-500 mb-5 leading-relaxed">Este análisis visualiza cómo la implementación de los servicios escala la percepción y funcionalidad de tu marca frente al mercado.</p>
                                <div className="flex flex-wrap gap-4 text-[10px] font-mono font-bold uppercase">
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-zinc-200"></div> Actual</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-ocd-green"></div> Con Open Club</div>
                                </div>
                            </div>
                            <div className="h-56 flex items-center justify-center">
                                <RadarChart data={radarData} />
                            </div>
                        </div>

                        <div className="mb-10 p-5 bg-ocd-gray border border-ocd-border rounded-sm">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-5 md:gap-0">
                                <div>
                                    <span className="font-mono text-[10px] text-ocd-textMuted font-bold uppercase tracking-widest block mb-1">Ciclo de entrega proyectado</span>
                                    <div className="text-xl font-bold text-ocd-black uppercase tracking-tighter">~{stats.totalWeeks} semanas</div>
                                </div>
                                <div className="text-xl font-bold text-ocd-green uppercase">Presupuestado</div>
                            </div>
                            <div className="timeline-container h-16">
                                <div className="timeline-line top-[38px] md:top-[30px]"></div>
                                <div className="flex justify-between relative">
                                    {['Briefing', 'Concepto', 'Producción', 'Handoff'].map((step, i) => (
                                        <div key={i} className="flex flex-col items-center gap-3 w-1/4">
                                            <div className={`timeline-dot w-3 h-3 ${i===0?'active':''}`}></div>
                                            <span className="font-mono text-[10px] font-bold text-ocd-textMuted uppercase text-center">{step}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="mb-10 space-y-8">
                            {PHASES.map((phase) => {
                                const selectedInPhase = phase.items.filter(i => selectedItems.has(i.id));
                                const phasePrice = selectedInPhase.reduce((acc, curr) => acc + (curr.priceOverride !== undefined ? curr.priceOverride : curr.hours * BASE_RATE), 0);
                                const isAllSelected = selectedInPhase.length === phase.items.length;
                                return (
                                    <div key={phase.id}>
                                        <button onClick={() => {
                                            const next = new Set(selectedItems);
                                            phase.items.forEach(item => { if (isAllSelected) next.delete(item.id); else next.add(item.id); });
                                            setSelectedItems(next);
                                        }} className="w-full flex flex-col md:flex-row justify-between items-start md:items-center bg-ocd-gray px-5 py-4 border border-ocd-border border-b-0 no-print hover:bg-gray-100 transition-colors gap-3 select-none">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-5 h-5 rounded border flex items-center justify-center shrink-0 ${isAllSelected ? 'bg-ocd-green border-ocd-green text-black' : 'border-gray-400 bg-white'}`}>
                                                    {isAllSelected && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                                </div>
                                                <div className="font-bold text-ocd-black text-[15px] uppercase tracking-wide">{phase.title}</div>
                                                <span className={`font-mono text-[10px] font-bold px-2 py-0.5 rounded-sm uppercase ${phase.color}`}>{phase.tag}</span>
                                            </div>
                                            <div className="font-mono text-[13px] text-ocd-textMuted font-bold">{fCLP(phasePrice)}</div>
                                        </button>
                                        <div className="border border-ocd-border bg-white divide-y divide-gray-100">
                                            {phase.items.map(item => {
                                                const isSelected = selectedItems.has(item.id);
                                                const price = item.priceOverride !== undefined ? item.priceOverride : item.hours * BASE_RATE;
                                                return (
                                                    <div key={item.id} onClick={() => toggleItem(item.id)} className={`p-5 md:p-4 grid grid-cols-1 md:grid-cols-12 gap-4 cursor-pointer transition-colors ${isSelected ? 'hover:bg-green-50' : 'opacity-40 grayscale print:hidden'}`}>
                                                        <div className="md:col-span-4 flex items-start gap-4">
                                                            <div className={`w-5 h-5 rounded-sm border flex items-center justify-center shrink-0 mt-0.5 ${isSelected ? 'bg-ocd-green border-ocd-green text-black' : 'border-gray-300'}`}>

                                    </div>

                        <div className="mb-12 border-2 border-ocd-black rounded-sm overflow-hidden">

                                <div className="flex justify-between items-center mb-8 text-[15px] font-bold text-ocd-green italic"><span>Benefit Applied (-20%)</span><span className="font-mono">-{fCLP(stats.discount)}</span></div>

                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-5">

                                        <div className="text-[14px] text-zinc-600 leading-relaxed">{step.d}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                                {isExporting ? 'Generando...' : '1. Descargar PDF'}
                                            </button>
                                            <button 
                                                type="button" 
                                                onClick={() => handleWhatsApp('payment')} 
                                                className="bg-ocd-green text-black font-mono text-[13px] font-bold py-5 rounded-2xl uppercase tracking-widest hover:brightness-110 active:opacity-80 transition-all flex justify-center items-center gap-3"
                                            >
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>

                                            <div className="bg-[#111] p-6 rounded-3xl border border-[#222]">

                                                <div className="text-[13px] text-zinc-400 space-y-1.5 font-mono">
                                                    <strong className="text-white block mb-2 font-sans text-[15px]">Javiera Saint-Jour</strong>
                                                    <span>RUT: 18.445.291-K</span><br/>
                                                    <span>Scotiabank — Cta. Corriente</span><br/>
                                                    <span>Nº 976998219</span><br/>
                                                    <span className="block mt-2 text-zinc-300">openclubdesign@gmail.com</span>
                                                </div>
                                            </div>
                                            <div className="bg-ocd-green/10 border border-ocd-green/20 p-6 rounded-3xl text-center flex flex-col items-center justify-center">
                                                <p className="text-[13px] text-zinc-300 leading-relaxed mb-4">¿Tienes dudas o necesitas ajustar algo?</p>
                                                <button onClick={() => handleWhatsApp('help')} className="bg-white text-black px-6 py-3 rounded-full font-bold text-[11px] uppercase tracking-widest hover:bg-zinc-200 transition-colors flex items-center gap-2">✶ Conversar ahora</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-16 text-center border-t border-[#222] pt-12">
                                    <span className="block text-white text-[14px] font-bold tracking-widest uppercase mb-2">muchas gracias ♡</span>
                                    <span className="block text-ocd-green text-3xl font-black tracking-tighter italic drop-shadow-[0_0_12px_rgba(74,222,128,0.4)]">~✷♡♡ será hermoso ♡♡✷~</span>
                                </div>
                            </div>
                        </div>

                        <div className="break-before-page pt-10"></div>
                        <div className="mb-14">
                            <div className="font-mono text-[11px] text-ocd-green font-bold tracking-widest uppercase mb-3">/// Handoff</div>
                            <h3 className="text-3xl font-black text-ocd-black mb-8 border-b border-ocd-border pb-3 uppercase tracking-tighter">Entregables finales</h3>
                            <ul className="space-y-8">
                                {['Logotipo oficial: AI, EPS, PDF, PNG, JPG, SVG.', 'Manual de marca: Guía técnica integral y aplicaciones.', 'Archivos de producción: Documentos listos para imprenta.'].map((item, i) => (
                                    <li key={i} className="flex items-start gap-5">
                                        <div className="text-ocd-green mt-1 shrink-0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                                        <span className="text-zinc-600 text-[15px] leading-relaxed font-medium">{item}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        <div className="mt-36 flex flex-col md:flex-row justify-between items-center md:items-end border-t border-gray-200 pt-36 gap-10 relative pb-10">
                            <div className="absolute top-10 md:-top-20 left-1/2 md:left-auto md:right-[15%] -translate-x-1/2 md:translate-x-0 w-32 h-32 md:w-44 h-44 text-ocd-green opacity-90 pointer-events-none mix-blend-multiply">
                                <svg viewBox="0 0 100 100" className="w-full h-full animate-[spin_15s_linear_infinite]">
                                    <defs><path id="sealPath" d="M 50, 50 m -36, 0 a 36,36 0 1,1 72,0 a 36,36 0 1,1 -72,0" /></defs>
                                    <text fontSize="10" fontWeight="bold" fill="currentColor" className="font-mono uppercase tracking-widest">
                                        <textPath href="#sealPath" startOffset="0%" textLength="226" lengthAdjust="spacingAndGlyphs">• OPEN CLUB • AUTHORIZED • OPEN CLUB • AUTHORIZED </textPath>
                                    </text>
                                </svg>
                                <div className="absolute inset-0 flex items-center justify-center font-black text-6xl tracking-tighter pt-1.5">O</div>
                            </div>
                            <div className="w-full md:w-56 text-center order-2 md:order-1 relative z-10">
                                <div className="border-b border-black mb-3 pb-12 w-3/4 mx-auto md:w-full relative flex justify-center items-end opacity-20"><span className="font-black text-[11px] tracking-tighter uppercase text-ocd-black leading-none">OPEN SYSTEM</span></div>
                                <div className="font-bold text-ocd-black uppercase text-[11px] tracking-widest">Aprobación Cliente</div>
                            </div>
                            <div className="order-3 md:order-2 font-mono text-[10px] text-zinc-400 tracking-[0.2em] uppercase font-bold bg-white/80 backdrop-blur-sm px-4 py-1.5 rounded">Open Club System v.45.0</div>
                            <div className="w-full md:w-72 text-center md:text-right order-1 md:order-3 relative z-10">
                                <div className="border-b border-black mb-3 pb-12 w-3/4 mx-auto md:w-full text-ocd-green font-mono text-[12px] italic font-bold uppercase">Auth_YI_Director</div>

                                <div className="font-mono text-[10px] text-zinc-500 mt-2 uppercase font-bold italic tracking-widest">Dirección y producción creativa</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
