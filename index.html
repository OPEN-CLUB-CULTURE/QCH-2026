<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta estratégica - Queenchis | OPEN CLUB</title>
    
    <!-- LIBRERÍAS DE EXPORTACIÓN Y RENDIMIENTO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- TIPOGRAFÍA SISTEMA -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- FRAMEWORK -->

        tailwind.config = {

    <style>

            -webkit-tap-highlight-color: transparent;

            width: 100%; 
            max-width: 100%;

            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);

        @media (min-width: 768px) {
            .a4-page {
                width: 210mm;
                max-width: 210mm;
                min-height: 297mm;

        #pdf-master {

        .pdf-hr { border-bottom: 1.5px solid #000; margin: 24px 0; }
        .pdf-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #ddd; }

        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00D64F; border-radius: 10px; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }

        textarea {
            field-sizing: content;

            border-radius: 12px;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- CONSTANTES ---
        const BASE_RATE = 25000;
        const DISCOUNT_PCT = 0.20;
        const TAX_RATE = 0.1375; // Tasa Retención Honorarios Chile 2024

        // --- COMPONENTES AUXILIARES ---
        function RadarChart({ data }) {
            const points = data.length;
            const radius = 68; 
            const center = 100;
            const angleStep = (Math.PI * 2) / points;
            const getPath = (values) => {
                return values.map((val, i) => {
                    const r = (val / 10) * radius;
                    const x = center + r * Math.sin(i * angleStep);
                    const y = center - r * Math.cos(i * angleStep);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ') + ' Z';
            };
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full max-w-[280px] mx-auto overflow-visible">
                    {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => (
                        <circle key={i} cx={center} cy={center} r={radius * p} stroke="#E5E7EB" strokeWidth="1" fill="none" />
                    ))}
                    {data.map((_, i) => {
                        const x2 = center + radius * Math.sin(i * angleStep);
                        const y2 = center - radius * Math.cos(i * angleStep);
                        return <line key={i} x1={center} y1={center} x2={x2} y2={y2} stroke="#E5E7EB" strokeWidth="1" />;
                    })}
                    <path d={getPath(data.map(d => d.current))} fill="#8B8B8B" fillOpacity="0.15" stroke="#8B8B8B" strokeWidth="1" />
                    <path d={getPath(data.map(d => d.potential))} fill="#00D64F" fillOpacity="0.25" stroke="#00D64F" strokeWidth="2.5" />
                    {data.map((d, i) => (
                        <text key={i} x={center + (radius + 28) * Math.sin(i * angleStep)} y={center - (radius + 20) * Math.cos(i * angleStep)} textAnchor="middle" fill="#656568" className="font-mono text-[7px] font-bold uppercase tracking-tighter">
                            {d.axis}
                        </text>
                    ))}
                </svg>
            );
        }

        const fCLP = (num) => '$' + Math.round(num || 0).toLocaleString('es-CL').replace(/,/g, '.');

        // --- CONFIGURACIÓN DE FASES ---
        const PHASES = [
            {
                id: 'f1',
                title: 'Fase 1: Identidad & Fundación',
                tag: 'NECESARIA',
                color: 'bg-ocd-green text-black font-bold',
                items: [
                    { id: 'f1_0', name: 'Sesión: Briefing & Definición', desc: 'Alineación de objetivos y marco creativo (Cortesía).', hours: 0, days: 1, isEssential: true },
                    { id: 'f1_1', name: 'Logo Principal + Sistema Visual', desc: 'Desarrollo de direcciones gráficas oficiales y variantes técnicas.', hours: 14.0, days: 5, isEssential: true },
                    { id: 'f1_2', name: 'Manual de Marca Master', desc: 'Guía técnica de paleta de colores, tipografía y normas de uso.', hours: 5.0, days: 2, priceOverride: 100000, isEssential: true },
                    { id: 'f1_3', name: 'Señalética Física (Pieza Unitaria)', desc: 'Diseño técnico de 1 pieza clave para el local físico. Posibilidad de aumentar cantidad.', hours: 2.0, days: 2, priceOverride: 50000, isEssential: true, canMultiply: true },
                    { id: 'f1_4', name: 'Diseño de Menú Base', desc: 'Diseño de carta adaptable estratégica. Arquitectura de contenido.', hours: 6.0, days: 3, isEssential: true }
                ]
            },
            {
                id: 'f2',
                title: 'Fase 2: Expansión & Arte Visual',
                tag: 'SUGERIDA',
                color: 'bg-ocd-black text-ocd-green',
                items: [
                    { id: 'f2_1', name: 'Stickers Packaging', desc: 'Diseño de etiquetas para diversos soportes de marca.', hours: 2.0, days: 1, priceOverride: 50000 },
                    { id: 'f2_pap', name: 'Papelería Corporativa', desc: 'Diseño de pieza impresa (flyers, tarjetas o posters).', hours: 3.5, days: 2, priceOverride: 50000 },
                    { id: 'f2_m', name: 'Ilustración / Mascot Creation', desc: 'Desarrollo de personaje identitario animado en 3 poses.', hours: 8.0, days: 4, priceOverride: 50000 },
                    { id: 'f2_p', name: 'Dirección para Campaña', desc: 'Conceptos visuales y narrativa para el lanzamiento.', hours: 6.0, days: 3 },
                    { id: 'f2_f', name: 'Sesión: Presentación Final', desc: 'Cierre de etapa y entrega oficial de activos (Cortesía).', hours: 0, days: 1, priceOverride: 0 }
                ]
            },
            {
                id: 'f3',
                title: 'Fase 3: Entorno Digital & Merch',
                tag: 'OPCIONAL',
                color: 'bg-zinc-100 text-zinc-500',
                items: [
                    { id: 'f3_1', name: 'Landing Page (UI)', desc: 'Interfaz de alto impacto entregada en Figma o código HTML.', hours: 25.0, days: 10 },
                    { id: 'f3_2', name: '12 Plantillas Editables RRSS', desc: 'Set de 12 plantillas maestras a elección (Posts o Stories).', hours: 6.5, days: 3 },
                    { id: 'm_base', name: 'Merch / Diseño Base', desc: 'Aplicación simple en indumentaria (delantales o tote bags).', hours: 2.5, days: 2, priceOverride: 50000 },
                    { id: 'cons_1', name: 'Consultoría Estratégica', desc: 'Asesoría técnica para la toma de decisiones tácticas.', hours: 1.0, days: 0, priceOverride: 50000 }
                ]
            }
        ];

        // =====================================================================
        // APP PRINCIPAL
        // =====================================================================
        const App = () => {
            const [selectedItems, setSelectedItems] = useState(new Set([
                'f1_0', 'f1_1', 'f1_2', 'f1_3', 'f1_4', 'f2_1', 'f2_pap', 'm_base', 'f2_f'
            ]));
            const [quantities, setQuantities] = useState({ 'f1_3': 1 }); 
            const [expandedPhases, setExpandedPhases] = useState(new Set(['f1', 'f2', 'f3'])); 
            const [isExporting, setIsExporting] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState('01'); 
            const [isApproved, setIsApproved] = useState(false);
            const [observations, setObservations] = useState("");

            const toggleItem = (id) => {
                const next = new Set(selectedItems);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedItems(next);
            };

            const updateQuantity = (id, delta) => {
                const current = quantities[id] || 1;
                const next = Math.max(1, current + delta);
                setQuantities({ ...quantities, [id]: next });
                if (!selectedItems.has(id)) toggleItem(id);
            };

            const togglePhase = (phaseId) => {
                const next = new Set(expandedPhases);
                if (next.has(phaseId)) next.delete(phaseId); else next.add(phaseId);
                setExpandedPhases(next);
            };

            const stats = useMemo(() => {
                let rawTotal = 0;
                const details = [];
                PHASES.forEach(p => {
                    p.items.forEach(i => {
                        if (selectedItems.has(i.id)) {
                            const qty = quantities[i.id] || 1;
                            const unitPrice = (i.priceOverride !== undefined ? i.priceOverride : i.hours * BASE_RATE);
                            const itemPrice = unitPrice * qty;
                            rawTotal += itemPrice;
                            details.push({ 
                                name: i.name + (qty > 1 ? ` (x${qty})` : ''), 
                                price: itemPrice 
                            });
                        }
                    });
                });
                
                const discount = Math.round((rawTotal * DISCOUNT_PCT) / 1000) * 1000;
                const liquido = rawTotal - discount;
                
                // Cálculo Boleta de Honorarios (Inversión Líquida a Bruta)
                // Bruto = Liquido / (1 - Tasa)
                const bruto = Math.round((liquido / (1 - TAX_RATE)) / 100) * 100;
                const retencion = bruto - liquido;

                return { rawTotal, discount, finalLiquido: liquido, bruto, retencion, details, count: selectedItems.size };
            }, [selectedItems, quantities]);

            const abonoA = Math.round((stats.bruto * 0.5) / 1000) * 1000;
            const abonoB = Math.round((stats.bruto * 0.3) / 1000) * 1000;

            const handleDownloadPDF = async () => {
                if (isExporting) return;
                setIsExporting(true);
                const element = document.getElementById('pdf-master');
                const originalScroll = window.scrollY;
                window.scrollTo(0, 0); 
                await new Promise(r => setTimeout(r, 800));

                try {
                    const canvas = await html2canvas(element, {
                        scale: 3, useCORS: true, backgroundColor: '#ffffff', logging: false, windowWidth: 800
                    });
                    const imgData = canvas.toDataURL('image/png', 1.0);
                    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    const imgWidth = 210; 
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight, undefined, 'FAST');
                    pdf.save(`OCD_Propuesta_Queenchis.pdf`);
                } catch (err) { console.error(err); } 
                finally { window.scrollTo(0, originalScroll); setIsExporting(false); }
            };

            const handleWhatsApp = (type = 'payment') => {
                const planText = selectedPlan === '01' ? 'Protocolo Bifásico (50/50)' : 'Estructura Trifásica (30/30/40)';
                const paymentAmount = selectedPlan === '01' ? abonoA : abonoB;
                const paymentMsg = `Confirmación de avance con la ruta *${planText}* para Queenchis. Adjunto PDF y comprobante de abono por ${fCLP(paymentAmount)}. (Datos: RUT, Nombres, Domicilio, Comuna).`;
                const helpMsg = `Solicitud de contacto para resolver dudas sobre la propuesta de Queenchis.`;
                const text = type === 'payment' ? paymentMsg : helpMsg;
                window.location.assign(`https://api.whatsapp.com/send?phone=56949873116&text=${encodeURIComponent(text)}`);
            };

            return (
                <div className="flex flex-col items-center relative min-h-screen overflow-x-hidden">
                    
                    {/* MAESTRO PDF (EDITORIAL MINIMAL - INVISIBLE) */}
                    <div id="pdf-master">
                        <div className="flex justify-between items-end mb-10">
                            <div><h1 className="text-5xl font-black tracking-tighter leading-none">OPEN CLUB</h1><p className="pdf-mono text-zinc-500 mt-2">Visual Infrastructure Studio</p></div>
                            <div className="text-right pdf-mono">REF_ID: OCD-QCH-2026<br/>FECHA: 22 ABRIL 2026</div>
                        </div>
                        <div className="pdf-hr"></div>
                        <h2 className="text-2xl font-black uppercase mb-8">Orden de Cotización: Queenchis</h2>
                        <div className="mb-10">
                            <p className="pdf-mono mb-4 border-b-2 border-black pb-2">Servicios en Plan</p>
                            {stats.details.map((d, i) => (
                                <div key={i} className="pdf-row pdf-mono text-[10px]"><span>{d.name}</span><span>{fCLP(d.price)}</span></div>
                            ))}
                        </div>
                        <div className="mb-10">
                            <p className="pdf-mono mb-4 border-b-2 border-black pb-2">Desglose Tributario (SII)</p>
                            <div className="pdf-row pdf-mono"><span>Inversión Líquida Total</span><span>{fCLP(stats.finalLiquido)}</span></div>
                            <div className="pdf-row pdf-mono"><span>Retención Impuesto (13.75%)</span><span>{fCLP(stats.retencion)}</span></div>
                            <div className="flex justify-between items-end mt-8 pt-6 border-t-2 border-black"><span className="font-black text-xs uppercase tracking-[0.2em]">Inversión Bruta Final</span><span className="text-4xl font-black">{fCLP(stats.bruto)}</span></div>
                        </div>
                        {observations && (
                            <div className="mb-10 p-6 bg-zinc-50 border-l-4 border-black"><p className="pdf-mono mb-2">Notas del Cliente</p><p className="text-sm italic font-medium">"{observations}"</p></div>
                        )}
                        <div className="mt-20 flex justify-between pt-10 border-t border-black">
                            <div className="w-1/3"><div className="border-b border-black mb-2 h-10"></div><p className="pdf-mono text-center">Firma Cliente</p></div>
                            <div className="w-1/3 text-right"><p className="font-black uppercase text-sm">Javiera Saint-Jour</p><p className="pdf-mono text-zinc-400">Open Club System</p></div>
                        </div>
                    </div>

                    {/* INTERFAZ WEB */}
                    <div className="a4-page animate-fade-in">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-2 border-ocd-black pb-5 md:pb-6 mb-10 gap-5 md:gap-0">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-3.5 h-3.5 bg-ocd-green rounded-full"></div>
                                    <h1 className="font-black text-3xl md:text-4xl tracking-tighter text-ocd-black uppercase leading-none">OPEN CLUB</h1>
                                </div>
                                <div className="font-mono text-[10px] md:text-[11px] tracking-[0.25em] text-ocd-textMuted uppercase font-bold ml-6">Visual Infrastructure</div>
                            </div>
                            <div className="text-left md:text-right font-mono text-[11px] md:text-[12px] text-ocd-textMuted leading-relaxed uppercase font-bold">
                                <div>REF_ID: OCD-QCH-2026</div>
                                <div>FECHA: 22 ABRIL 2026</div>
                            </div>
                        </header>

                        <div className="mb-10">
                            <span className="font-mono text-[10px] text-ocd-green font-bold tracking-[0.3em] uppercase mb-2 block">Branding Strategy /// Client Proposal</span>
                            <h2 className="text-3xl md:text-5xl font-black tracking-tighter text-zinc-900 leading-none uppercase">Propuesta de cotización <br/> para Queenchis</h2>
                        </div>

                        {/* CONTEXTO */}
                        <section className="mb-10">
                            <h2 className="text-xl md:text-2xl font-bold tracking-tight text-ocd-black mb-4 uppercase tracking-tighter text-zinc-900 font-sans">Contexto</h2>
                            <div className="text-zinc-700 text-sm md:text-[15px] leading-relaxed max-w-2xl mb-5">
                                <p className="mb-3">
                                    <strong>Queenchis</strong> es una sandwichería de autor inspirada en la mascota Queen. Ubicado en la Galería La Pérgola, Providencia, el proyecto combina el respeto por la cocina de autor con la versatilidad de carnes de cocción lenta y un toque de estética nipona.
                                </p>
                                <p>
                                    El objetivo es alinear la visión gourmet con un sistema de marca escalable, priorizando la identidad core, la mascota y los puntos de contacto que definen la experiencia frente al público.
                                </p>
                            </div>
                            <div className="font-mono text-[11px] bg-ocd-gray border border-ocd-border inline-block px-4 py-2.5 text-ocd-black font-bold uppercase tracking-widest">Identidad: Queenchis</div>
                        </section>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 items-center bg-zinc-50 p-6 rounded-2xl border border-zinc-100 no-print">
                            <div>
                                <h3 className="text-lg md:text-xl font-bold mb-2 uppercase text-ocd-black tracking-tight">Brand Potential Matrix</h3>
                                <p className="text-[11px] text-zinc-500 mb-5 leading-relaxed">Impacto proyectado en el sistema visual de la marca.</p>
                                <div className="flex flex-wrap gap-4 text-[10px] font-mono font-bold uppercase">
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-zinc-200"></div> Estado Actual</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-ocd-green"></div> Con Open Club</div>
                                </div>
                            </div>
                            <div className="h-56 flex items-center justify-center">
                                <RadarChart data={[
                                    { axis: 'Identidad', current: 2, potential: 9.5 },
                                    { axis: 'Digital', current: 1.5, potential: 9 },
                                    { axis: 'Local', current: 2, potential: 9.5 },
                                    { axis: 'Branding', current: 2, potential: 9 },
                                    { axis: 'Social', current: 3, potential: 8.5 }
                                ]} />
                            </div>
                        </div>

                        {/* NOTA DE ESCALABILIDAD DESTACADA */}
                        <div className="mb-10 p-6 border-2 border-dashed border-ocd-green bg-ocd-green/5 rounded-2xl animate-fade-in">
                            <div className="flex items-start gap-4">
                                <div className="bg-ocd-green text-black rounded-full w-6 h-6 flex items-center justify-center shrink-0 mt-1 font-bold text-xs">!</div>
                                <div className="text-sm text-zinc-800 leading-relaxed">
                                    <strong className="block uppercase text-xs font-black tracking-widest mb-1">Nota de Flexibilidad Operativa</strong>
                                    Esta cotización es dinámica y se basa en los servicios seleccionados actualmente. En caso de decidir integrar requerimientos o servicios adicionales no listados, el presupuesto se ajustará mediante conversación previa y acuerdo mutuo.
                                </div>
                            </div>
                        </div>

                        {/* LISTA DE SERVICIOS */}
                        <div className="mb-14">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-6">
                                <div>
                                    <h3 className="text-xl font-black text-ocd-black uppercase tracking-tight font-sans">Servicios & Entregables</h3>
                                    <p className="text-xs text-zinc-500 font-mono uppercase tracking-widest mt-1">✶ Haz clic en los servicios para agregarlos o quitarlos de tu plan personalizado.</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-[10px] font-mono text-ocd-green font-bold bg-ocd-green/10 px-2 py-1 rounded">{stats.count} Ítems seleccionados</span>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {PHASES.map((phase) => {
                                    const selectedInPhase = phase.items.filter(i => selectedItems.has(i.id));
                                    const phasePrice = selectedInPhase.reduce((acc, curr) => {
                                        const qty = quantities[curr.id] || 1;
                                        const price = (curr.priceOverride !== undefined ? curr.priceOverride : curr.hours * BASE_RATE);
                                        return acc + (price * qty);
                                    }, 0);
                                    const isAllSelected = selectedInPhase.length === phase.items.length;
                                    const isExpanded = expandedPhases.has(phase.id);

                                    return (
                                        <div key={phase.id} className="w-full border border-ocd-border rounded-xl overflow-hidden shadow-sm">
                                            <div 
                                                className="w-full flex justify-between items-center bg-ocd-gray px-5 py-4 no-print select-none cursor-pointer active:bg-zinc-200 transition-colors"
                                                onClick={() => togglePhase(phase.id)}
                                            >
                                                <div className="flex items-center gap-4 flex-1">
                                                    <div className={`transition-transform duration-300 ${isExpanded ? 'rotate-0' : '-rotate-90'}`}>
                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                                    </div>
                                                    <div className="font-bold text-ocd-black text-[14px] uppercase tracking-wide leading-none">{phase.title}</div>
                                                    <span className={`font-mono text-[9px] font-bold px-2 py-0.5 rounded-sm uppercase tracking-tighter ${phase.color}`}>{phase.tag}</span>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="font-mono text-[13px] text-ocd-textMuted font-bold">{fCLP(phasePrice)}</div>
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            const next = new Set(selectedItems);
                                                            phase.items.forEach(item => { if (isAllSelected) next.delete(item.id); else next.add(item.id); });
                                                            setSelectedItems(next);
                                                        }}
