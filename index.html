<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta estratégica - Queenchis | OPEN CLUB</title>
    
    <!-- LIBRERÍAS DE EXPORTACIÓN Y RENDIMIENTO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TIPOGRAFÍA SISTEMA -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- FRAMEWORK -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ocd: {
                            black: '#050505',
                            green: '#4ADE80',
                            gray: '#F8F9FA',

                            accent: '#800020'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        /* UI/UX Optimizations */
        * { -webkit-tap-highlight-color: transparent; outline: none !important; }
        body { background-color: #f3f4f6; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        
        .a4-page { 
            width: 100%; 
            max-width: 100%; 
            background: white; 
            margin: 0 auto; 
            padding: 1.5rem; 
            padding-bottom: 8rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            position: relative; 
        }
        @media (min-width: 768px) {
            .a4-page {
                max-width: 210mm;
                min-height: 297mm;
                margin: 2rem auto;
                padding: 20mm;
                padding-bottom: 20mm;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            }
        }

        .quick-cart {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Inter', sans-serif;
        }
        
        .cart-bubble {
            background: #050505;
            color: white;
            padding: 12px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            touch-action: manipulation;
        }
        .cart-bubble:hover { transform: scale(1.05); border-color: #4ADE80; }
        .cart-bubble:active { transform: scale(0.95); }
        
        .cart-dropdown {
            width: calc(100vw - 32px);
            max-width: 400px;
            background: #111113; 
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 12px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .cart-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4ADE80; border-radius: 10px; }

        .timeline-container { position: relative; padding-top: 20px; }
        .timeline-line { height: 2px; background: #E5E7EB; position: absolute; left: 0; right: 0; }
        .timeline-dot { width: 10px; height: 10px; background: #E5E7EB; border-radius: 50%; position: relative; z-index: 1; }
        .timeline-dot.active { background: #4ADE80; box-shadow: 0 0 10px #4ADE80; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .a4-page { width: 100%; max-width: none; min-height: 100%; margin: 0; padding: 10mm; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Componente RadarChart
        function RadarChart({ data }) {
            const points = data.length;
            const radius = 68; 
            const center = 100;
            const angleStep = (Math.PI * 2) / points;
            const getPath = (values) => {
                return values.map((val, i) => {
                    const r = (val / 10) * radius;
                    const x = center + r * Math.sin(i * angleStep);
                    const y = center - r * Math.cos(i * angleStep);
                    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ') + ' Z';
            };
            return (
                <svg viewBox="0 0 200 200" className="w-full h-full max-w-[280px] mx-auto overflow-visible">
                    {[0.2, 0.4, 0.6, 0.8, 1].map((p, i) => (
                        <circle key={i} cx={center} cy={center} r={radius * p} stroke="#E5E7EB" strokeWidth="1" fill="none" />
                    ))}
                    {data.map((_, i) => {
                        const x2 = center + radius * Math.sin(i * angleStep);
                        const y2 = center - radius * Math.cos(i * angleStep);
                        return <line key={i} x1={center} y1={center} x2={x2} y2={y2} stroke="#E5E7EB" strokeWidth="1" />;
                    })}
                    <path d={getPath(data.map(d => d.current))} fill="#8B8B8B" fillOpacity="0.15" stroke="#8B8B8B" strokeWidth="1" />
                    <path d={getPath(data.map(d => d.potential))} fill="#4ADE80" fillOpacity="0.25" stroke="#4ADE80" strokeWidth="2.5" />
                    {data.map((d, i) => {
                        const x = center + (radius + 28) * Math.sin(i * angleStep);
                        const y = center - (radius + 20) * Math.cos(i * angleStep);
                        return (
                            <text key={i} x={x} y={y} textAnchor="middle" fill="#656568" className="font-mono text-[7px] font-bold uppercase tracking-tighter">
                                {d.axis}
                            </text>
                        );
                    })}
                </svg>
            );
        }

        const fCLP = (num) => '$' + Math.round(num || 0).toLocaleString('es-CL').replace(/,/g, '.');

        const BASE_RATE = 25000;
        const DISCOUNT_PCT = 0.20;

        const PHASES = [
            {
                id: 'f1',
                title: 'Fase 1: Identidad & Fundación',
                tag: 'NECESARIA',
                color: 'bg-ocd-green text-black font-bold',
                items: [
                    { id: 'f1_0', name: 'Reunión: Briefing & definición', desc: 'Alineación de objetivos y marco estratégico del proyecto (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0, isEssential: true },
                    { id: 'f1_1', name: 'Logo principal + sistema visual', desc: 'Desarrollo de 2 direcciones gráficas estratégicas, versiones oficiales y reducciones técnicas.', hours: 14.0, days: 5, isEssential: true },
                    { id: 'f1_2', name: 'Manual de marca', desc: 'Guía técnica integral que consolida paleta de colores, familia tipográfica y normas de uso.', hours: 5.0, days: 2, priceOverride: 100000, isEssential: true },
                    { id: 'f1_3', name: 'Señalética física', desc: 'Diseño técnico de señalización de marca para el local físico (ej. letrero de fachada o pizarras).', hours: 4.0, days: 2, isEssential: true },
                    { id: 'f1_4', name: 'Diseño de menú base', desc: 'Diseño de 1 ejemplar maestro de carta adaptable. Arquitectura de contenido estratégica.', hours: 6.0, days: 3, isEssential: true }
                ]
            },
            {
                id: 'f2',
                title: 'Fase 2: Expansión & Arte visual',
                tag: 'SUGERIDA',
                color: 'bg-ocd-black text-ocd-green',
                items: [
                    { id: 'f2_1', name: 'Stickers packaging', desc: 'Diseño de 3 variantes de etiquetas de marca para diversos soportes.', hours: 2.0, days: 1, priceOverride: 50000 },
                    { id: 'f2_pap', name: 'Papelería corporativa', desc: 'Diseño para pieza impresa para difusión y operación (flyers, tarjetas o posters).', hours: 3.5, days: 2, priceOverride: 50000 },
                    { id: 'f2_m', name: 'Ilustración / Mascot creation', desc: 'Desarrollo de personaje o mascota animada en 3 poses.', hours: 8.0, days: 4, priceOverride: 50000 },
                    { id: 'f2_p', name: 'Dirección creativa para campaña', desc: 'Conceptos visuales y narrativa para el lanzamiento del local y redes sociales.', hours: 6.0, days: 3 },
                    { id: 'f2_f', name: 'Reunión: Presentación final', desc: 'Cierre de etapa de diseño y entrega oficial de activos del sistema (sesión de cortesía).', hours: 0, days: 1, priceOverride: 0 }
                ]
            },
            {
                id: 'f3',
                title: 'Fase 3: Entorno digital & Merch',
                tag: 'OPCIONAL',
                color: 'bg-zinc-100 text-zinc-500',
                items: [
                    { id: 'f3_1', name: 'Landing page (UI o HTML)', desc: 'Interfaz de alto impacto entregada en Figma o código HTML listo para web.', hours: 25.0, days: 10 },
                    { id: 'f3_2', name: '12 Plantillas editables RRSS', desc: 'Set de 12 plantillas maestras a elección del cliente (Posts o Stories).', hours: 6.5, days: 3 },
                    { id: 'm_base', name: 'Merch / Diseño base', desc: 'Aplicación simple en indumentaria (delantales, gorras o tote bags).', hours: 2.5, days: 2, priceOverride: 50000 },
                    { id: 'm_complex', name: 'Merch / Diseño ilustrado', desc: 'Arte a gran escala aplicada a soportes textiles premium.', hours: 5.5, days: 4, priceOverride: 100000 },
                    { id: 'cons_1', name: 'Consultoría estratégica', desc: 'Asesoría técnica para la toma de decisiones tácticas o expansivas.', hours: 1.0, days: 0, priceOverride: 50000 }
                ]
            }
        ];

        const App = () => {
            // Pre-seleccionados: esenciales + papelería + merch base
            const [selectedItems, setSelectedItems] = useState(new Set([
                'f1_0', 'f1_1', 'f1_2', 'f1_3', 'f1_4', 'f2_1', 'f2_pap', 'm_base', 'f2_f'
            ]));
            const [expandedPhases, setExpandedPhases] = useState(new Set(['f1', 'f2'])); 
            const [isExporting, setIsExporting] = useState(false);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedPlan, setSelectedPlan] = useState('01'); 

            const toggleItem = (id) => {
                const next = new Set(selectedItems);
                if (next.has(id)) next.delete(id); else next.add(id);
                setSelectedItems(next);
            };

            const togglePhase = (phaseId) => {
                const next = new Set(expandedPhases);
                if (next.has(phaseId)) next.delete(phaseId); else next.add(phaseId);
                setExpandedPhases(next);
            };

            const stats = useMemo(() => {
                let hrs = 0; let days = 0; let rawTotal = 0;
                const details = [];
                PHASES.forEach(p => {
                    p.items.forEach(i => {
                        if (selectedItems.has(i.id)) {
                            const itemPrice = (i.priceOverride !== undefined ? i.priceOverride : i.hours * BASE_RATE);
                            hrs += i.hours;
                            days += i.days;
                            rawTotal += itemPrice;
                            details.push({ name: i.name, price: itemPrice });
                        }
                    });
                });
                const totalDays = days + Math.ceil(days * 0.20);
                const totalWeeks = (totalDays / 5).toFixed(1);
                const discount = Math.round((rawTotal * DISCOUNT_PCT) / 1000) * 1000;
                const final = rawTotal - discount;
                return { totalDays, totalWeeks, rawTotal, discount, final, details };
            }, [selectedItems]);

            const abonoA = Math.round((stats.final * 0.5) / 1000) * 1000;
            const abonoB = Math.round((stats.final * 0.3) / 1000) * 1000;

            const handleDownloadPDF = async () => {
                if (isExporting) return;
                setIsExporting(true);
                setIsCartOpen(false);
                const currentScroll = window.scrollY; 
                window.scrollTo(0, 0); 
                setTimeout(async () => {
                    const element = document.querySelector('.a4-page');
                    try {
                        const canvas = await html2canvas(element, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            scrollY: 0,
                            height: element.scrollHeight 
                        });
                        const imgData = canvas.toDataURL('image/png');
                        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                        pdf.save(`Propuesta_Queenchis_Ruta${selectedPlan}.pdf`);
                    } catch (err) { console.error(err); }
                    finally { window.scrollTo(0, currentScroll); setIsExporting(false); }
                }, 300);
            };

            const handleWhatsApp = (type = 'payment') => {
                const planAbono = selectedPlan === '01' ? abonoA : abonoB;
                const text = type === 'payment' 
                    ? `¡Hola Yi! ✶ Te confirmo que avanzaremos con la *Ruta ${selectedPlan}* de la propuesta. Aquí te adjunto el PDF de la propuesta y el comprobante de transferencia por el abono inicial de ${fCLP(planAbono)}. (Mis datos para la boleta: RUT, Nombres, Domicilio, Comuna). Gracias, ¡Hablamos!`
                    : `¡Hola Yi! ✶ Tengo algunas dudas sobre la propuesta, ¿podemos conversar?`;
                window.location.assign(`https://api.whatsapp.com/send?phone=56949873116&text=${encodeURIComponent(text)}`);
            };

            return (
                <div className="text-ocd-black font-sans flex flex-col items-center relative min-h-screen">
                    
                    {/* QUICK CART MODULE */}
                    {!isExporting && (
                        <div className="quick-cart no-print">
                            <div className={`cart-dropdown ${isCartOpen ? 'open' : ''}`}>
                                <div className="flex justify-between items-center mb-5 border-b border-white/10 pb-4">
                                    <span className="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-zinc-400">System Cart</span>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-white p-2 -mr-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                                </div>
                                <div className="overflow-y-auto custom-scrollbar pr-2 space-y-2 flex-1 mb-3">
                                    {stats.details.map((item, idx) => (
                                        <div key={idx} className="group flex justify-between items-start gap-4 p-3 rounded-lg hover:bg-white/5 transition-colors">
                                            <div className="flex gap-3 items-center flex-1">
                                                <span className="font-mono text-[10px] text-zinc-600">{(idx + 1).toString().padStart(2, '0')}</span>
                                                <span className="text-[12px] text-zinc-300 font-medium leading-snug">{item.name}</span>
                                            </div>
                                            <span className="font-mono text-[11px] text-ocd-green font-medium shrink-0">{item.price > 0 ? fCLP(item.price) : 'Cortesía'}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-5 border-t border-white/10 space-y-4">
                                    <div className="flex justify-between text-[12px] md:text-[13px] text-zinc-400 font-mono"><span>Subtotal</span><span>{fCLP(stats.rawTotal)}</span></div>
                                    <div className="flex justify-between text-[12px] md:text-[13px] text-ocd-green font-mono font-bold"><span>Open Ticket (-20%)</span><span>-{fCLP(stats.discount)}</span></div>
                                    <div className="h-px w-full bg-white/10 my-3"></div>
                                    <div className="flex justify-between items-end">
                                        <span className="font-mono text-[10px] uppercase tracking-widest text-zinc-400">Inversión Final</span>
                                        <span className="text-4xl font-black text-white tracking-tighter leading-none">{fCLP(stats.final)}</span>
                                    </div>
                                    <button onClick={() => document.getElementById('checkout-section').scrollIntoView({ behavior: 'smooth' })} className="w-full bg-ocd-green text-black font-mono text-[12px] font-bold py-4 rounded-xl uppercase tracking-widest hover:brightness-110 active:opacity-80 transition-all flex justify-center items-center gap-2">Ir a Finalizar</button>
                                </div>
                            </div>
                            <div className="cart-bubble" onClick={() => setIsCartOpen(!isCartOpen)}>
                                <div className="flex flex-col items-start leading-none">
                                    <span className="text-[9px] font-mono font-bold uppercase tracking-widest text-zinc-400 mb-1">Total Proyecto</span>
                                    <span className="text-lg md:text-xl font-black tracking-tight">{fCLP(stats.final)}</span>
                                </div>
                                <div className="w-px h-8 bg-white/20 mx-2"></div>
                                <div className="bg-ocd-green text-black w-8 h-8 rounded-full flex items-center justify-center">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DOCUMENT PAGE */}
                    <div className="a4-page">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-2 border-ocd-black pb-5 md:pb-6 mb-10 gap-5 md:gap-0">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-3.5 h-3.5 bg-ocd-green rounded-full"></div>
                                    <h1 className="font-black text-3xl md:text-4xl tracking-tighter text-ocd-black uppercase leading-none">OPEN CLUB</h1>
                                </div>
                                <div className="font-mono text-[10px] md:text-[11px] tracking-[0.25em] text-ocd-textMuted uppercase font-bold ml-6">Visual Infrastructure</div>
                            </div>
                            <div className="text-left md:text-right font-mono text-[11px] md:text-[12px] text-ocd-textMuted leading-relaxed">
                                <div>REF_ID: OCD-QCH-2026</div>
                                <div>FECHA: 22 ABRIL 2026</div>
                                <div className="text-ocd-green font-bold mt-2 bg-ocd-green/10 px-2.5 py-1 inline-block uppercase text-[10px]">Status: Valid proposal</div>
                            </div>
                        </header>

                        <section className="mb-10">
                            <h2 className="text-2xl md:text-3xl font-bold tracking-tight text-ocd-black mb-4 uppercase tracking-tighter">Contexto Estratégico</h2>
                            <div className="text-zinc-700 text-sm md:text-[15px] leading-relaxed max-w-2xl mb-5">
                                <p className="mb-3">
                                    <strong>Queenchis</strong> es una sandwichería de autor inspirada en la mascota Queen (el nombre rescata el sonido fonético de "Cuinchi"). Ubicado en la Galería La Pérgola, Avenida Providencia, el proyecto combina el respeto por la cocina de autor con la versatilidad de sándwiches clásicos y carnes de cocción lenta.
                                </p>
                                <p>
                                    Nuestro objetivo es alinear esta visión gourmet con un sistema de marca escalable, priorizando la identidad core, la mascota y los puntos de contacto que definen la experiencia frente al público.
                                </p>
                            </div>
                            <div className="font-mono text-[10px] bg-ocd-gray border border-ocd-border inline-block px-4 py-2.5 text-ocd-black font-bold uppercase tracking-widest">Identidad: Queenchis</div>
                        </section>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10 items-center bg-zinc-50 p-6 rounded-2xl border border-zinc-100">
                            <div>
                                <h3 className="text-lg md:text-xl font-bold mb-2 uppercase text-ocd-black tracking-tight">Potencial de Marca</h3>
                                <p className="text-[11px] text-zinc-500 mb-5 leading-relaxed">Impacto proyectado en el sistema visual.</p>
                                <div className="flex flex-wrap gap-4 text-[10px] font-mono font-bold uppercase">
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-zinc-200"></div> Estado Actual</div>
                                    <div className="flex items-center gap-2"><div className="w-3 h-3 bg-ocd-green"></div> Con Open Club</div>
                                </div>
                            </div>
                            <div className="h-56 flex items-center justify-center">
                                <RadarChart data={[
                                    { axis: 'Identidad', current: 2, potential: 9.5 },
                                    { axis: 'Digital', current: 1.5, potential: 9 },
                                    { axis: 'Experiencia', current: 2, potential: 9.5 },
                                    { axis: 'Branding', current: 2, potential: 9 },
                                    { axis: 'Social', current: 3, potential: 8.5 }
                                ]} />
                            </div>
                        </div>

                        <div className="mb-10 p-5 bg-ocd-gray border border-ocd-border rounded-sm">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-5 md:gap-0">
                                <div>
                                    <span className="font-mono text-[10px] text-ocd-textMuted font-bold uppercase tracking-widest block mb-1">Línea de tiempo proyectada</span>
                                    <div className="text-xl font-bold text-ocd-black uppercase tracking-tighter">Ciclo de entrega: ~{stats.totalWeeks} semanas</div>
                                </div>
                                <div className="text-xl font-bold text-ocd-green uppercase">Presupuestado</div>
                            </div>
                            <div className="timeline-container h-12">
                                <div className="timeline-line top-[30px]"></div>
                                <div className="flex justify-between relative">
                                    {['Briefing', 'Concepto', 'Producción', 'Handoff'].map((step, i) => (
                                        <div key={i} className="flex flex-col items-center gap-3 w-1/4">
                                            <div className={`timeline-dot w-2.5 h-2.5 ${i===0?'active':''}`}></div>
                                            <span className="font-mono text-[9px] font-bold text-ocd-textMuted uppercase text-center">{step}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* ACORDEONES DE SERVICIOS - INTERACTIVOS */}
                        <div className="mb-10 space-y-4">
                            {PHASES.map((phase) => {
                                const selectedInPhase = phase.items.filter(i => selectedItems.has(i.id));
                                const phasePrice = selectedInPhase.reduce((acc, curr) => acc + (curr.priceOverride !== undefined ? curr.priceOverride : curr.hours * BASE_RATE), 0);
                                const isAllSelected = selectedInPhase.length === phase.items.length;
                                const isExpanded = expandedPhases.has(phase.id);

                                return (
                                    <div key={phase.id} className="w-full border border-ocd-border rounded-xl overflow-hidden shadow-sm">
                                        <div className="w-full flex justify-between items-center bg-ocd-gray px-5 py-3 no-print select-none">
                                            <div className="flex items-center gap-4 flex-1 cursor-pointer py-1" onClick={() => togglePhase(phase.id)}>
                                                <div className={`transition-transform duration-300 ${isExpanded ? 'rotate-0' : '-rotate-90'}`}>

                            </div>

            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
